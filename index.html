<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">

  <header class="landing-header">
    <div class="brand">
      <img src="logo.png" alt="Logo TaskFly">
      <span>TaskFly</span>
    </div>

    <nav>
      <a href="login.html">Entrar</a>
      <a href="cadastro.html" class="nav-primary">Criar conta</a>
    </nav>
  </header>

  <main class="landing-main">
    <section class="hero-content">
      <span class="hero-badge">Organização pessoal simples e rápida</span>

      <h1>Controle suas tarefas com mais clareza.</h1>

      <p>
        Crie projetos, organize tarefas, defina prazos e receba lembretes
        para manter sua rotina em movimento.
      </p>

      <div class="hero-actions">
        <a href="cadastro.html" class="cta-primary">Começar agora</a>
        <a href="login.html" class="cta-secondary">Já tenho conta</a>
      </div>
    </section>

    <section class="hero-preview">
      <div class="preview-card">
        <div class="preview-header">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <h3>Hoje</h3>

        <div class="preview-task high"></div>
        <div class="preview-task medium"></div>
        <div class="preview-task low"></div>
      </div>
    </section>
  </main>

</body>
</html>
